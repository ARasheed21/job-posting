{% extends "user_base.html" %}
{% load static %}

{% block style %}
<link rel="stylesheet" href="{% static 'styles/home.css' %}">
<link rel="stylesheet" href="{% static 'styles/job_list.css' %}">
<script src="{% static 'scripts/search.js' %}"></script>
{% endblock %}

{% block title %}
<title>User Home</title>
{% endblock %}

{% block content %}

<div class="info">
    <div class="content">

        <h2>Welcome to our Job Search Website</h2>
        <p>Find your dream job today!</p>

        <form id="search-form">
            <select id="search-options" name="search-options">
                <option value="job-title">Job Title</option>
                <option value="exp-years">Years Of Experience</option>
            </select>
    
            <input type="text" id="search-bar" name="search-bar" placeholder="Enter Keyword...">
    
            <button id="search-btn">Search</button>
        </form>

    </div>

    <div id="img">
        <img src="{% static 'images/img.jpeg' %}" width="500" height="400" />
    </div>

</div>

<div id="jobListContainer" style="background-color: #CDE2FF;">
    <!-- Search results will be displayed here -->
</div>

{% endblock %}
